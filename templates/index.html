<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
  <title>Imposter</title>
  
</head>
<body>
  <h1>Welcome to imposter!</h1>
  <div class="box"> This is a box</div>
  <form method="post">
    <p><input type="number" name="num_of_players" placeholder="Enter the # of players" required></p>
    <p><input type="text" name="num_of_imposters" placeholder="Enter the number of imposters" required></p>
    <!-- add a list and iterate over it from app-->
    <p><select name="category" id="category" multiple>
      {% for category in categories: %}
        <option value="{{ category }}">{{ category }}</option>
      {% endfor %}
    </select></p>
    <p><button type="submit">Submit</button></p>
  </form>
  {% if result%}
    <p>Result: {{ result }}</p>
  {% endif %}
</body>
</html>
